<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERACT â Admin Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0f1419 0%,#1a1f2e 50%,#0d1117 100%);color:#e0e6ed;line-height:1.6;min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0f1419 0%,#1a1f2e 50%,#0d1117 100%)}
.login-box{background:rgba(26,31,46,0.95);border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:52px 44px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);backdrop-filter:blur(10px)}
.login-box .lock{font-size:42px;margin-bottom:16px;opacity:.9}
.login-box h1{font-size:24px;font-weight:600;background:linear-gradient(135deg,#00d4ff 0%,#0099ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.login-box .sub{color:#8892b0;font-size:13px;margin-bottom:28px}
.login-box input{width:100%;padding:12px 16px;border:1px solid rgba(0,212,255,0.2);border-radius:8px;background:rgba(15,20,25,0.8);color:#e0e6ed;font-size:14px;margin-bottom:14px;outline:none;transition:all .3s;font-family:inherit}
.login-box input::placeholder{color:#5a6578}
.login-box input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 10px rgba(0,212,255,0.1)}
.login-box button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#00d4ff,#0099ff);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}
.login-box button:hover{box-shadow:0 0 20px rgba(0,212,255,0.3);transform:translateY(-1px)}
.login-err{color:#ff6b6b;font-size:12px;margin-top:10px;display:none}

/* HEADER */
#contentScreen{display:none}
.header{background:rgba(15,20,25,0.95);border-bottom:1px solid rgba(255,255,255,0.1);padding:20px 30px;backdrop-filter:blur(10px);box-shadow:0 4px 30px rgba(0,0,0,.3)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#00d4ff 0%,#0099ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:12px;color:#8892b0;letter-spacing:.5px;margin-top:3px}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.header-actions a,.header-actions button{padding:8px 14px;background:rgba(0,212,255,0.1);color:#00d4ff;text-decoration:none;border:1px solid rgba(0,212,255,0.3);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.header-actions a:hover,.header-actions button:hover{background:rgba(0,212,255,0.2);border-color:rgba(0,212,255,0.6);box-shadow:0 0 20px rgba(0,212,255,0.2)}

/* CONTAINER */
.container{max-width:1400px;margin:0 auto;padding:28px}

/* OVERVIEW STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:linear-gradient(135deg,rgba(0,212,255,0.1) 0%,rgba(0,153,255,0.05) 100%);border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:22px;backdrop-filter:blur(10px);transition:all .3s}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(0,212,255,0.5);box-shadow:0 10px 30px rgba(0,212,255,0.15)}
.stat-label{font-size:11px;color:#8892b0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:#00d4ff;margin-bottom:2px}
.stat-detail{font-size:11px;color:#5a6578}

/* NAV TABS */
.nav-tabs{display:flex;gap:5px;border-bottom:1px solid rgba(255,255,255,0.05);overflow-x:auto;padding:0;margin-bottom:28px}
.nav-tab{padding:12px 20px;background:transparent;color:#8892b0;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:14px;font-weight:500;transition:all .3s;white-space:nowrap;font-family:inherit}
.nav-tab:hover{color:#00d4ff}
.nav-tab.active{color:#00d4ff;border-bottom-color:#00d4ff}

/* SECTION CONTENT */
.section{display:none;animation:fadeIn .3s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* SHEET TABS (sub-navigation) */
.sheet-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.sheet-pill{padding:7px 14px;background:rgba(26,31,46,0.6);border:1px solid rgba(0,212,255,0.15);border-radius:20px;color:#8892b0;font-size:12px;cursor:pointer;transition:all .3s;white-space:nowrap;font-family:inherit}
.sheet-pill.active{background:rgba(0,212,255,0.15);color:#00d4ff;border-color:rgba(0,212,255,0.4)}
.sheet-pill:hover{border-color:rgba(0,212,255,0.4);color:#c0c8d6}

/* SHEET OVERVIEW CARDS */
.sheet-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.sheet-card{background:rgba(26,31,46,0.6);border:1px solid rgba(0,212,255,0.12);border-radius:10px;padding:18px 20px;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px)}
.sheet-card:hover{border-color:rgba(0,212,255,0.4);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,212,255,0.1)}
.sheet-card.active{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.08)}
.sheet-card-icon{font-size:20px;margin-bottom:6px}
.sheet-card-title{font-size:14px;font-weight:600;color:#e0e6ed;margin-bottom:4px}
.sheet-card-meta{font-size:11px;color:#5a6578}
.sheet-card-rows{font-size:11px;color:#00d4ff;margin-top:4px;font-weight:500}

/* SEARCH */
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;max-width:400px;padding:10px 14px;background:rgba(26,31,46,0.8);border:1px solid rgba(0,212,255,0.2);border-radius:8px;color:#e0e6ed;font-size:13px;outline:none;transition:all .3s;font-family:inherit}
.search-bar input::placeholder{color:#5a6578}
.search-bar input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 10px rgba(0,212,255,0.1)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(0,212,255,0.15);background:rgba(26,31,46,0.8);margin-bottom:24px;-webkit-overflow-scrolling:touch;backdrop-filter:blur(10px)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:rgba(0,212,255,0.1);border-bottom:1px solid rgba(0,212,255,0.2);position:sticky;top:0;z-index:5}
th{padding:14px 12px;text-align:left;font-weight:600;font-size:11px;color:#00d4ff;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:12px;color:#c0c8d6;border-top:1px solid rgba(0,212,255,0.05);max-width:280px;overflow:hidden;text-overflow:ellipsis}
tbody tr:hover td{background:rgba(0,212,255,0.05)}
tbody tr:nth-child(even) td{background:rgba(26,31,46,0.4)}
tbody tr:nth-child(even):hover td{background:rgba(0,212,255,0.05)}
.status-open,.status-critical{color:#ff6b6b;font-weight:600}
.status-closed,.status-ok,.status-settled{color:#00e676;font-weight:600}
.severity-high{color:#ff6b6b;font-weight:600}
.severity-medium{color:#ffab40;font-weight:600}
.severity-low{color:#5a6578}

/* BILLS CARDS */
.bills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.bill-card{background:rgba(26,31,46,0.6);border:1px solid rgba(0,212,255,0.12);border-radius:10px;padding:18px 20px;transition:all .3s;display:flex;justify-content:space-between;align-items:center;gap:14px}
.bill-card:hover{border-color:rgba(0,212,255,0.4);box-shadow:0 8px 20px rgba(0,212,255,0.1)}
.bill-info{flex:1;min-width:0}
.bill-title{font-size:14px;font-weight:500;color:#e0e6ed;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bill-meta{font-size:11px;color:#5a6578;margin-bottom:3px}
.bill-tags{display:flex;gap:6px;margin-top:6px}
.bill-tag{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:.3px}
.bill-tag.cat{background:rgba(0,212,255,0.1);color:#00d4ff;border:1px solid rgba(0,212,255,0.2)}
.bill-tag.ctr{background:rgba(0,230,118,0.1);color:#00e676;border:1px solid rgba(0,230,118,0.2)}
.bill-tag.type{background:rgba(255,171,64,0.1);color:#ffab40;border:1px solid rgba(255,171,64,0.2)}
.bill-action a{padding:8px 14px;background:rgba(0,212,255,0.1);color:#00d4ff;text-decoration:none;border:1px solid rgba(0,212,255,0.3);border-radius:6px;font-size:12px;font-weight:500;transition:all .3s;white-space:nowrap}
.bill-action a:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 15px rgba(0,212,255,0.2)}

/* FILTER PILLS */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-pill{padding:7px 14px;background:rgba(26,31,46,0.6);border:1px solid rgba(0,212,255,0.15);border-radius:20px;color:#8892b0;font-size:12px;cursor:pointer;transition:all .3s;font-family:inherit}
.filter-pill.active{background:rgba(0,212,255,0.15);color:#00d4ff;border-color:rgba(0,212,255,0.4)}
.filter-pill:hover{border-color:rgba(0,212,255,0.4);color:#c0c8d6}

/* SECTION HEADER */
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-title{font-size:18px;font-weight:600;color:#e0e6ed;display:flex;align-items:center;gap:10px}
.section-subtitle{font-size:12px;color:#5a6578;margin-top:2px}

/* FOOTER */
.footer{text-align:center;color:#5a6578;font-size:11px;padding:28px 0 16px;border-top:1px solid rgba(255,255,255,0.05);margin-top:40px}

/* RESPONSIVE */
@media(max-width:768px){
  .container{padding:16px}
  .header{padding:14px 18px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .nav-tab{padding:10px 14px;font-size:13px}
  .bills-grid{grid-template-columns:1fr}
  .sheet-cards{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .sheet-cards{grid-template-columns:1fr}
  .header h1{font-size:18px}
}
</style>
</head>

  <div class="login-err" id="loginErr">Incorrect password. Try again.</div>
</div>
</div>

  </div>

</div>
</div>

async function sha256(msg){const enc=new TextEncoder().encode(msg);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}

async function doLogin(){
  const pw=document.getElementById('pwInput').value;
  if((await sha256(pw))===ADMIN_HASH){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('contentScreen').style.display='block';
    sessionStorage.setItem('admin_auth','1');
    initDashboard();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

function initDashboard(){
  buildOverview();
  buildBills('all');
  buildSheetCards('disc',DISC_DATA,'discCards','discNav');
  buildSheetCards('tp',TP_DATA,'tpCards','tpNav');
}

function buildOverview(){
  const discRows=Object.values(DISC_DATA).reduce((s,r)=>s+r.length,0);
  const tpRows=Object.values(TP_DATA).reduce((s,r)=>s+r.length,0);
  const discSheets=Object.keys(DISC_DATA).length;
  const tpSheets=Object.keys(TP_DATA).length;
  const html=[
    {v:BILLS.length,l:'Documents',d:'Bills & invoices'},
    {v:discSheets,l:'Reconciliation Sheets',d:discRows+' total rows'},
    {v:tpSheets,l:'Operations Sheets',d:tpRows+' total rows'},
    {v:discSheets+tpSheets+1,l:'Total Data Sources',d:'Across all categories'}
  ];
  document.getElementById('overviewStats').innerHTML=html.map(s=>'<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-value">'+s.v+'</div><div class="stat-detail">'+s.d+'</div></div>').join('');
}

function switchSection(id,btn){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sec-'+id).classList.add('active');
}

// BILLS
function buildBills(filter){
  // Build filter bar
  const cats=[...new Set(BILLS.map(b=>b.cat))];
  document.getElementById('billsFilterBar').innerHTML='<button class="filter-pill'+(filter==='all'?' active':'')+'" onclick="buildBills(\'all\')">All ('+BILLS.length+')</button>'+cats.map(c=>{
    const count=BILLS.filter(b=>b.cat===c).length;
    return '<button class="filter-pill'+(filter===c?' active':'')+'" onclick="buildBills(\''+c+'\')">'+c.charAt(0).toUpperCase()+c.slice(1)+' ('+count+')</button>';
  }).join('');

  const filtered=filter==='all'?BILLS:BILLS.filter(b=>b.cat===filter);
  document.getElementById('billsGrid').innerHTML=filtered.map(b=>'<div class="bill-card"><div class="bill-info"><div class="bill-title">'+b.title+'</div><div class="bill-meta">'+b.meta+'</div><div class="bill-tags"><span class="bill-tag cat">'+b.cat+'</span>'+(b.ctr!=='\u2014'?'<span class="bill-tag ctr">'+b.ctr+'</span>':'')+'<span class="bill-tag type">'+b.type+'</span></div></div><div class="bill-action"><a href="'+b.file+'" target="_blank">View \u2192</a></div></div>').join('');
}

// SHEET CARDS + NAV
function buildSheetCards(prefix,data,cardsId,navId){
  const keys=Object.keys(data);
  document.getElementById(cardsId).innerHTML=keys.map(k=>{
    const rows=data[k].length;
    const icon=SHEET_ICONS[k]||'\u{1F4C4}';
    const desc=SHEET_DESCS[k]||k.replace(/_/g,' ');
    return '<div class="sheet-card" id="card-'+prefix+'-'+k+'" onclick="loadSheet(\''+prefix+'\',\''+k+'\')"><div class="sheet-card-icon">'+icon+'</div><div class="sheet-card-title">'+k.replace(/_/g,' ')+'</div><div class="sheet-card-meta">'+desc+'</div><div class="sheet-card-rows">'+rows+' rows</div></div>';
  }).join('');

  document.getElementById(navId).innerHTML=keys.map(k=>'<button class="sheet-pill" id="pill-'+prefix+'-'+k+'" onclick="loadSheet(\''+prefix+'\',\''+k+'\')">'+k.replace(/_/g,' ')+'</button>').join('');
}

function loadSheet(prefix,name){
  const data=prefix==='disc'?DISC_DATA:TP_DATA;
  const rows=data[name];
  if(!rows||!rows.length)return;

  // Activate card + pill
  document.querySelectorAll('#sec-'+prefix+' .sheet-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('#sec-'+prefix+' .sheet-pill').forEach(p=>p.classList.remove('active'));
  const card=document.getElementById('card-'+prefix+'-'+name);
  const pill=document.getElementById('pill-'+prefix+'-'+name);
  if(card)card.classList.add('active');
  if(pill)pill.classList.add('active');

  // Build table
  const first=rows[0];
  const hasHdr=first.some(c=>c&&c.length>0&&isNaN(c));
  let hdr,body;
  if(hasHdr){hdr=first;body=rows.slice(1)}
  else{hdr=first.map((_,i)=>'Col '+(i+1));body=rows}

  document.getElementById(prefix+'Head').innerHTML='<tr>'+hdr.map(h=>'<th>'+esc(h)+'</th>').join('')+'</tr>';
  document.getElementById(prefix+'Body').innerHTML=body.filter(r=>!r.every(c=>!c||c.trim()==='')).map(r=>'<tr>'+r.map(c=>'<td>'+fmtCell(c)+'</td>').join('')+'</tr>').join('');

  // Show table
  document.getElementById(prefix+'TableWrap').style.display='block';
  document.getElementById(prefix+'TableWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function fmtCell(v){
  if(!v)return'<span style="color:#3a3f4a">\u2014</span>';
  v=esc(v);
  if(v==='OPEN'||v==='CRITICAL')return'<span class="status-open">'+v+'</span>';
  if(v==='CLOSED'||v==='OK'||v==='SETTLED')return'<span class="status-closed">'+v+'</span>';
  if(v==='HIGH')return'<span class="severity-high">'+v+'</span>';
  if(v==='MEDIUM')return'<span class="severity-medium">'+v+'</span>';
  if(v==='LOW')return'<span class="severity-low">'+v+'</span>';
  return v;
}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function searchTable(prefix){
  const input=document.querySelector('#sec-'+prefix+' .search-bar input');
  const term=input.value.toLowerCase();
  document.getElementById(prefix+'Body').querySelectorAll('tr').forEach(tr=>{
    tr.style.display=tr.textContent.toLowerCase().includes(term)?'':'none';
  });
}

if(sessionStorage.getItem('admin_auth')==='1'){setTimeout(initDashboard,100)}
